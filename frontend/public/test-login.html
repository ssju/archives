<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #66b1ff;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>登录接口测试</h1>

    <div class="form-group">
        <label>用户名:</label>
        <input type="text" id="username" value="admin">
    </div>

    <div class="form-group">
        <label>密码:</label>
        <input type="password" id="password" value="admin123">
    </div>

    <button onclick="testLogin()">测试登录</button>

    <div class="result" id="result">等待测试...</div>

    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.textContent = '正在登录...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                resultDiv.textContent = '响应数据:\n' + JSON.stringify(data, null, 2);

                if (data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    resultDiv.textContent += '\n\n✅ 登录成功!\nToken已保存到localStorage';

                    // 3秒后跳转
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 3000);
                } else {
                    resultDiv.textContent += '\n\n❌ 登录失败: ' + data.message;
                }
            } catch (error) {
                resultDiv.textContent = '❌ 请求失败:\n' + error.message;
                console.error('登录错误:', error);
            }
        }
    </script>
</body>
</html>
